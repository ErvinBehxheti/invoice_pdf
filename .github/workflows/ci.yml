name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    env:
      # Dummy value — no static page queries the database at build time,
      # but lib/db.ts constructs its adapter at module-import time, so this
      # just needs to be a syntactically present value, not a real connection.
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run test

      - run: npm run build
